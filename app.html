<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>House Hacking Calculator - Utah Edition</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f4f7f6; padding: 20px; color: #333; }
        .calc-container { max-width: 600px; margin: 0 auto; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 8px 30px rgba(0,0,0,0.1); }
        h1 { color: #2c3e50; text-align: center; border-bottom: 2px solid #3498db; padding-bottom: 10px; }
        .input-row { display: flex; gap: 15px; margin-bottom: 15px; flex-wrap: wrap; }
        .input-group { flex: 1; min-width: 200px; }
        label { display: block; font-size: 0.85rem; font-weight: bold; margin-bottom: 5px; color: #555; }
        input, select { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; font-size: 1rem; }
        button { width: 100%; padding: 15px; background-color: #27ae60; color: white; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; font-size: 1.1rem; margin-top: 10px; transition: 0.3s; }
        button:hover { background-color: #219150; }
        
        .market-buttons { margin-top: 20px; display: flex; gap: 10px; flex-wrap: wrap; justify-content: center; }
        .btn-city { background: #3498db; padding: 8px 12px; color: white; border-radius: 20px; font-size: 0.8rem; cursor: pointer; border: none; }

        .results { margin-top: 25px; padding: 20px; background: #ebf5fb; border-radius: 8px; display: none; border-left: 6px solid #3498db; }
        .result-item { display: flex; justify-content: space-between; margin-bottom: 8px; font-size: 1.1rem; }
        .highlight { font-weight: bold; color: #2c3e50; }
        .profit { color: #27ae60; font-weight: bold; }
        .loss { color: #e74c3c; font-weight: bold; }
        .nav-link { display: block; text-align: center; margin-top: 25px; color: #3498db; text-decoration: none; font-weight: bold; }
    </style>
</head>
<body>

<div class="calc-container">
    <h1>House Hack Pro</h1>
    
    <div class="input-row">
        <div class="input-group">
            <label>Purchase Price ($)</label>
            <input type="number" id="price" value="450000">
        </div>
        <div class="input-group">
            <label>Down Payment (%)</label>
            <input type="number" id="downPercent" value="3.5">
        </div>
    </div>

    <div class="input-row">
        <div class="input-group">
            <label>Interest Rate (%)</label>
            <input type="number" id="rate" value="6.5" step="0.1">
        </div>
        <div class="input-group">
            <label>Loan Term</label>
            <select id="term">
                <option value="30">30 Years</option>
                <option value="15">15 Years</option>
            </select>
        </div>
    </div>

    <div class="input-group">
        <label>Monthly Extra Costs (Tax/Ins/PMI) ($)</label>
        <input type="number" id="extraCosts" value="550">
    </div>

    <div class="input-group">
        <label>Est. Monthly Rent Income ($)</label>
        <input type="number" id="rentIncome" placeholder="Roommate total...">
    </div>

    <div class="market-buttons">
        <span style="width:100%; text-align:center; font-size:0.8rem; color:#888;">Load Market Averages:</span>
        <button class="btn-city" onclick="setRent(850)">Provo (Private Room)</button>
        <button class="btn-city" onclick="setRent(2200)">Orem (Basement Apt)</button>
        <button class="btn-city" onclick="setRent(1800)">Detroit (Single Family)</button>
    </div>

    <button onclick="runCalculator()">Calculate Net Cash Flow</button>

    <div id="results" class="results">
        <div class="result-item">
            <span>Down Payment + Closing (3%):</span>
            <span id="totalCash" class="highlight"></span>
        </div>
        <div class="
<script>
    function runCalculator() {
        // Get inputs
        const price = parseFloat(document.getElementById('price').value);
        const rate = parseFloat(document.getElementById('rate').value) / 100 / 12;
        const extra = parseFloat(document.getElementById('extraCosts').value);
        const rent = parseFloat(document.getElementById('rentIncome').value) || 0;

        // Math for Down Payment (3.5% FHA + 3% Closing)
        const downPayment = price * 0.065;
        document.getElementById('totalCash').innerText = "$" + downPayment.toLocaleString();

        // Math for Mortgage (30 year)
        const principal = price - (price * 0.035);
        const payments = 360;
        const x = Math.pow(1 + rate, payments);
        const monthlyMortgage = (principal * x * rate) / (x - 1);

        // Final Result
        const totalOut = (monthlyMortgage + extra) - rent;
        const resultElement = document.getElementById('finalResult');
        
        resultElement.innerText = "$" + Math.round(totalOut).toLocaleString();
        
        // Color coding
        if (totalOut < 1000) {
            resultElement.style.color = "#4CAF50"; // Green for good deal
        } else {
            resultElement.style.color = "#f44336"; // Red for expensive
        }
    }

    function setRent(val) {
        document.getElementById('rentIncome').value = val;
    }
    </script>
</body>
</html>
